version: '3.8'

services:
  db:
    build:
      context: ./backend
      dockerfile: Dockerfile.db
    container_name: ${PROJECT_NAME:-app}_db
    environment:
      - SERVICE_TYPE=db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${PROJECT_NAME:-app}
    env_file:
      - .env
    entrypoint: /app/wait-and-release.sh
    depends_on:
      port-finder:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ${PROJECT_NAME:-app}_backend
    environment:
      - SERVICE_TYPE=backend
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/${PROJECT_NAME:-app}
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/${PROJECT_NAME:-app}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${PROJECT_NAME:-app}
    env_file:
      - .env
    entrypoint: /app/wait-and-release.sh
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ${PROJECT_NAME:-app}_frontend
    environment:
      - SERVICE_TYPE=frontend
      - VITE_API_URL=http://localhost
    env_file:
      - .env
    entrypoint: /app/wait-and-release.sh
    depends_on:
      backend:
        condition: service_healthy

  port-finder:
    external: true
    name: port-finder
