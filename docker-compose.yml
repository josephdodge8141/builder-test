version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ${PROJECT_NAME:-app}_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${PROJECT_NAME:-app}
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ${PROJECT_NAME:-app}_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/${PROJECT_NAME:-app}
      - DATABASE_URL_SYNC=postgresql://postgres:postgres@db:5432/${PROJECT_NAME:-app}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=${PROJECT_NAME:-app}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ${PROJECT_NAME:-app}_frontend
    environment:
      - VITE_API_URL=http://backend:8000
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend
